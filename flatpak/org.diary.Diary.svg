<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b8def"/>
      <stop offset="1" stop-color="#3a6fd8"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8edf5"/>
    </linearGradient>
  </defs>

  <!-- Book cover -->
  <rect x="26" y="16" width="78" height="96" rx="10" fill="url(#cover)"/>
  <!-- Spine -->
  <rect x="26" y="16" width="14" height="96" rx="7" fill="#2f5ec4"/>

  <!-- Pages -->
  <rect x="44" y="24" width="52" height="80" rx="6" fill="url(#page)"/>

  <!-- Text lines -->
  <g stroke="#c3cfe2" stroke-width="3" stroke-linecap="round">
    <line x1="54" y1="40" x2="86" y2="40"/>
    <line x1="54" y1="52" x2="86" y2="52"/>
    <line x1="54" y1="64" x2="78" y2="64"/>
  </g>

  <!-- Lock (encryption) -->
  <g transform="translate(70,66)">
    <path d="M6 12 v-5 a8 8 0 0 1 16 0 v5" fill="none" stroke="#2f5ec4" stroke-width="4"/>
    <rect x="0" y="12" width="28" height="22" rx="5" fill="#f5b14c"/>
    <circle cx="14" cy="21" r="3.5" fill="#7a4a12"/>
    <rect x="12.5" y="22" width="3" height="7" rx="1.5" fill="#7a4a12"/>
  </g>

  <!-- Bookmark -->
  <path d="M86 16 v26 l-7 -6 -7 6 v-26 z" fill="#e5534b"/>
</svg>
